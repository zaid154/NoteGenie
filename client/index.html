<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO. NOTE: this is site-level meta for a SPA. For per-route titles/descriptions
         (better for deep-link sharing), add react-helmet-async later and set tags per page. -->
    <title>NoteGenie — Free study material & AI study assistant</title>
    <meta
      name="description"
      content="Download free solved assignments, question papers, notes and guides — and turn any PDF, link or slide into AI notes, flashcards, quizzes and a tutor. Instant download, secure UPI/card payments."
    />
    <meta name="keywords" content="solved assignments, question papers, study notes, IGNOU, distance learning, AI notes, flashcards, quiz generator, study material" />
    <meta name="author" content="NoteGenie" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://notegenie-d5199.web.app/" />

    <!-- Open Graph (Facebook / WhatsApp / LinkedIn link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NoteGenie" />
    <meta property="og:title" content="NoteGenie — Free study material & AI study assistant" />
    <meta
      property="og:description"
      content="Free solved assignments, papers, notes & guides for every course — plus built-in AI notes, flashcards, quizzes and a tutor."
    />
    <meta property="og:url" content="https://notegenie-d5199.web.app/" />
    <meta property="og:image" content="https://notegenie-d5199.web.app/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NoteGenie — Free study material & AI study assistant" />
    <meta
      name="twitter:description"
      content="Free solved assignments, papers, notes & guides — plus AI notes, flashcards, quizzes and a tutor."
    />
    <meta name="twitter:image" content="https://notegenie-d5199.web.app/og-image.svg" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- theme-color adapts to the OS light/dark setting for the browser chrome. -->
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NoteGenie" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Anti-FOUC: apply saved dark mode + accent before first paint. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("notegenie_theme");
          if (t === "dark") document.documentElement.classList.add("dark");
          var a = localStorage.getItem("notegenie_accent") || "indigo";
          document.documentElement.setAttribute("data-accent", a);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
