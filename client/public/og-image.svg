<?xml version="1.0" encoding="UTF-8"?>
<!-- Social share card (1200x630). Branded with the storefront teal palette.
     SVG works in-browser and on modern crawlers; for maximum compatibility on
     older social platforms, export this to og-image.png (1200x630) and point the
     og:image / twitter:image meta at the .png. -->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="0.55" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark -->
  <g transform="translate(80 78)">
    <rect width="64" height="64" rx="16" fill="#ffffff"/>
    <text x="32" y="45" text-anchor="middle" font-size="36" font-weight="800" fill="#0f766e">N</text>
    <text x="84" y="44" font-size="34" font-weight="800" fill="#ffffff">NoteGenie</text>
  </g>

  <!-- Headline -->
  <text x="80" y="270" font-size="76" font-weight="800" fill="#ffffff">Free study material,</text>
  <text x="80" y="356" font-size="76" font-weight="800" fill="#ccfbf1">smarter with AI.</text>

  <!-- Subhead -->
  <text x="82" y="418" font-size="30" font-weight="500" fill="#e6fffb" opacity="0.92">Solved assignments, papers &amp; notes + AI flashcards, quizzes and a tutor.</text>

  <!-- Feature pills -->
  <g transform="translate(80 470)" font-size="24" font-weight="600" fill="#ffffff">
    <g>
      <rect width="248" height="56" rx="28" fill="#ffffff" fill-opacity="0.14"/>
      <text x="30" y="37">Instant download</text>
    </g>
    <g transform="translate(272 0)">
      <rect width="216" height="56" rx="28" fill="#ffffff" fill-opacity="0.14"/>
      <text x="30" y="37">Mostly free</text>
    </g>
    <g transform="translate(512 0)">
      <rect width="300" height="56" rx="28" fill="#f59e0b"/>
      <text x="30" y="37" fill="#3b2600">Secure UPI / Cards</text>
    </g>
  </g>
</svg>
