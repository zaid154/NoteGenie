# Render Blueprint — upgrade to starter plan to avoid cold starts.
services:
  - type: web
    name: notegenie-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://notegenie-d5199.web.app
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: ENCRYPTION_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_TEAM
        sync: false
